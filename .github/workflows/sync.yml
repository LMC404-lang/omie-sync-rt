name: Omie Supabase Sync

on:
  schedule:
    - cron: '0 */2 * * *'   # Incremental every 2 hours
    - cron: '0 2 * * *'     # Full sync at 2am daily
  workflow_dispatch:
    inputs:
      full:
        description: 'Run full sync (true/false)'
        required: false
        default: 'false'
      entity:
        description: 'Single entity to sync (leave blank for all)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run sync
        env:
          OMIE_APP_KEY:          ${{ secrets.OMIE_APP_KEY }}
          OMIE_APP_SECRET:       ${{ secrets.OMIE_APP_SECRET }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ENTITY="${{ github.event.inputs.entity }}"
          FULL="${{ github.event.inputs.full }}"

          if [ -n "$ENTITY" ]; then
            CMD="node scripts/sync-single.js $ENTITY"
            [ "$FULL" = "true" ] && CMD="$CMD --full"
          else
            CMD="node src/sync.js"
            [ "$FULL" = "true" ] && CMD="$CMD --full"
          fi

          echo "Running: $CMD"
          $CMD
